services:
  todo_db:
    image: postgres:16
    ports:
      - "5432:5432"
    container_name: todo_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 2s
      timeout: 2s
      retries: 10
    restart: always
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_db
    volumes:
      - data:/var/lib/postgresql/data
  todo_test_db:
    image: postgres:16
    container_name: todo_test_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: todo_test_db
  pgadmin4:
    image: dpage/pgadmin4:9.14
    container_name: todo_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - todo_db
  todo:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      todo_db:
        condition: service_healthy
    env_file:
      - .env
  redis:
    image: redis:7
    container_name: todo_redis
    ports:
      - "6379:6379"
  celery:
    build: .
    container_name: todo_celery
    command: celery -A internal.celery.celery_app.celery_app worker --loglevel=info
    depends_on:
      - redis
    env_file:
      - .env
      
volumes:
  data: